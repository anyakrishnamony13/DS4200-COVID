  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega@6"></script>

<body>
  <div id="vis"></div>
  <script>
    (function(vegaEmbed) {
      var spec = {"config": {"view": {"continuousWidth": 300, "continuousHeight": 300, "stroke": "#E4EAF0", "strokeWidth": 1}, "axis": {"domainColor": "#D4E0EA", "gridColor": "#EDF1F5", "labelColor": "#8FA8BC", "labelFont": "Inter", "labelFontSize": 11, "labelPadding": 6, "tickColor": "#D4E0EA", "titleColor": "#8FA8BC", "titleFont": "Inter", "titleFontSize": 12, "titlePadding": 10}, "legend": {"labelColor": "#8FA8BC", "labelFont": "Inter", "labelFontSize": 12, "padding": 8, "rowPadding": 6, "symbolSize": 100, "symbolStrokeWidth": 0, "titleColor": "#5A7A94", "titleFont": "Inter", "titleFontSize": 12, "titleFontWeight": "normal"}, "padding": {"top": 20, "right": 160, "bottom": 20, "left": 20}, "title": {"anchor": "start", "color": "#0D1B2A", "font": "Inter", "fontSize": 18, "fontWeight": "bold", "offset": 8, "subtitleColor": "#5A7A94", "subtitleFont": "Inter", "subtitleFontSize": 12, "subtitleLineHeight": 18}}, "layer": [{"mark": {"type": "rect", "stroke": "#ffffff", "strokeWidth": 3}, "encoding": {"color": {"field": "avg_change", "legend": {"gradientLength": 200, "gradientThickness": 16, "labelExpr": "format(datum.value, '+.1f')", "labelPadding": 6, "title": "Avg change in days/week", "titlePadding": 8, "values": [-1.0, -0.5, 0.0, 0.5, 1.0]}, "scale": {"domain": [-1.19, -0.595, 0, 0.595, 1.19], "interpolate": "lab", "range": ["#C0392B", "#F5A8AC", "#F7F9FC", "#7ED4CD", "#2EC4B6"]}, "type": "quantitative"}, "tooltip": [{"field": "group", "title": "Household income", "type": "nominal"}, {"field": "mode", "title": "Mode", "type": "nominal"}, {"field": "avg_change", "format": "+.2f", "title": "Avg change (days/wk)", "type": "quantitative"}], "x": {"axis": {"labelAngle": 0, "labelPadding": 8, "title": "Household income", "titlePadding": 12}, "field": "group", "sort": ["Under $35k", "$35k\u2013$74k", "$75k\u2013$124k", "$125k+"], "type": "nominal"}, "y": {"axis": {"labelPadding": 8, "title": "Transportation mode", "titlePadding": 12}, "field": "mode", "sort": ["Private Vehicle", "Ridehail/Taxi", "Transit", "Personal Bike", "Shared Bike", "Walking"], "type": "nominal"}}}, {"mark": {"type": "text", "font": "Inter", "fontSize": 12, "fontWeight": "bold"}, "encoding": {"color": {"condition": {"test": "abs(datum.avg_change) > 0.25", "value": "#ffffff"}, "value": "#0D1B2A"}, "text": {"field": "avg_change", "format": "+.2f", "type": "quantitative"}, "x": {"field": "group", "sort": ["Under $35k", "$35k\u2013$74k", "$75k\u2013$124k", "$125k+"], "type": "nominal"}, "y": {"field": "mode", "sort": ["Private Vehicle", "Ridehail/Taxi", "Transit", "Personal Bike", "Shared Bike", "Walking"], "type": "nominal"}}}], "data": {"name": "data-6d6fc6c621ef8bae7731f57b1d47f342"}, "height": 280, "title": {"text": "Mode shift matrix: which transportation modes gained and lost users?", "subtitle": ["Avg change in days/week of use (During COVID \u2212 Before COVID), by income group."], "subtitleColor": "#5A7A94"}, "width": 500, "$schema": "https://vega.github.io/schema/vega-lite/v6.1.0.json", "datasets": {"data-6d6fc6c621ef8bae7731f57b1d47f342": [{"group": "$125k+", "mode": "Private Vehicle", "avg_change": 0.77}, {"group": "$35k\u2013$74k", "mode": "Private Vehicle", "avg_change": 0.52}, {"group": "$75k\u2013$124k", "mode": "Private Vehicle", "avg_change": 1.19}, {"group": "Under $35k", "mode": "Private Vehicle", "avg_change": 0.43}, {"group": "$125k+", "mode": "Ridehail/Taxi", "avg_change": -0.16}, {"group": "$35k\u2013$74k", "mode": "Ridehail/Taxi", "avg_change": -0.03}, {"group": "$75k\u2013$124k", "mode": "Ridehail/Taxi", "avg_change": -0.07}, {"group": "Under $35k", "mode": "Ridehail/Taxi", "avg_change": -0.05}, {"group": "$125k+", "mode": "Transit", "avg_change": -0.23}, {"group": "$35k\u2013$74k", "mode": "Transit", "avg_change": -0.07}, {"group": "$75k\u2013$124k", "mode": "Transit", "avg_change": -0.11}, {"group": "Under $35k", "mode": "Transit", "avg_change": -0.05}, {"group": "$125k+", "mode": "Personal Bike", "avg_change": 0.05}, {"group": "$35k\u2013$74k", "mode": "Personal Bike", "avg_change": -0.04}, {"group": "$75k\u2013$124k", "mode": "Personal Bike", "avg_change": 0.02}, {"group": "Under $35k", "mode": "Personal Bike", "avg_change": 0.0}, {"group": "$125k+", "mode": "Shared Bike", "avg_change": -0.01}, {"group": "$35k\u2013$74k", "mode": "Shared Bike", "avg_change": 0.03}, {"group": "$75k\u2013$124k", "mode": "Shared Bike", "avg_change": 0.01}, {"group": "Under $35k", "mode": "Shared Bike", "avg_change": 0.02}, {"group": "$125k+", "mode": "Walking", "avg_change": 0.55}, {"group": "$35k\u2013$74k", "mode": "Walking", "avg_change": 0.32}, {"group": "$75k\u2013$124k", "mode": "Walking", "avg_change": 0.35}, {"group": "Under $35k", "mode": "Walking", "avg_change": 0.3}]}};
      var embedOpt = {"mode": "vega-lite"};

      function showError(el, error){
          el.innerHTML = ('<div style="color:red;">'
                          + '<p>JavaScript Error: ' + error.message + '</p>'
                          + "<p>This usually means there's a typo in your chart specification. "
                          + "See the javascript console for the full traceback.</p>"
                          + '</div>');
          throw error;
      }
      const el = document.getElementById('vis');
      vegaEmbed("#vis", spec, embedOpt)
        .catch(error => showError(el, error));
    })(vegaEmbed);

  </script>
